<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prototipo videos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .pantalla {
      width: 90%;
      max-width: 900px;
      background: rgba(255,255,255,0.08);
      padding: 40px;
      border-radius: 20px;
      text-align: center;
      display: none;
    }

    .activa { display: block; }

    button {
      padding: 12px 20px;
      margin: 10px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      background: #f59e0b;
    }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
    }

    .modal.activo { display: flex; }

    .contenido {
      width: 90%;
      max-width: 800px;
      background: #000;
      padding: 20px;
      border-radius: 12px;
      position: relative;
    }

    iframe {
      width: 100%;
      height: 400px;
      border: none;
    }

    .cerrar {
      position: absolute;
      top: 10px;
      right: 10px;
      background: red;
      color: white;
      padding: 8px;
      border-radius: 8px;
    }

    a { color: #38bdf8; }
  </style>
</head>
<body>

<div id="inicio" class="pantalla activa">
  <h1>Prototipo</h1>
  <button onclick="cambiar('videos')">Avanzar</button>
</div>

<div id="videos" class="pantalla">
  <h2>Veremos algunos videos</h2>
  <button onclick="abrir(1)">Video 1</button>
  <button onclick="abrir(2)">Video 2</button>
</div>

<div id="modal" class="modal">
  <div class="contenido">
    <button class="cerrar" onclick="cerrar()">Cerrar</button>
    <iframe id="frame" src=""></iframe>
    <p>
      Si no funciona:
      <a id="linkYT" href="#" target="_blank">Ver en YouTube</a>
    </p>
  </div>
</div>

<script>
function cambiar(id){
  document.querySelectorAll('.pantalla').forEach(p=>p.classList.remove('activa'));
  document.getElementById(id).classList.add('activa');
}

function abrir(num){
  let url = "";
  let link = "";

  if(num === 1){
    url = "https://www.youtube.com/embed/IYyUAqowDrU?autoplay=1";
    link = "https://www.youtube.com/watch?v=IYyUAqowDrU";
  } else {
    url = "https://www.youtube.com/embed/6Clj2hCFYOM?autoplay=1";
    link = "https://www.youtube.com/watch?v=6Clj2hCFYOM";
  }

  document.getElementById("frame").src = url;
  document.getElementById("linkYT").href = link;
  document.getElementById("modal").classList.add("activo");
}

function cerrar(){
  document.getElementById("frame").src = "";
  document.getElementById("modal").classList.remove("activo");
}
</script>

</body>
</html>
